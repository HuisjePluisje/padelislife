<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oefening | padelislife</title>
    <meta
      name="description"
      content="Oefeningpagina voor padelislife, opgebouwd als scanbare trainingspagina met volledige coachuitwerking."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="site-body">
    <div class="site-shell">
      <header class="site-header">
        <a class="site-brand" href="./index.html">
          <span class="site-brand-mark">PL</span>
          <span>
            <strong>padelislife</strong>
            <small>Train slim. Bouw logisch.</small>
          </span>
        </a>
        <nav class="site-nav">
          <a href="./index.html">Home</a>
          <a href="./ball-machine.html">Ballenmachine</a>
        </nav>
      </header>

      <main>
        <section class="exercise-hero" id="exercise-hero">
          <div class="exercise-hero-content">
            <div class="category-badge" id="exercise-category">padelislife</div>
            <h1 id="exercise-title">Oefening laden...</h1>
            <p class="exercise-subtitle" id="exercise-subtitle"></p>
            <div class="quick-stats" id="exercise-stats"></div>
          </div>
        </section>

        <section class="exercise-wrapper">
          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">🎾</span>
                <span class="section-title">Spelsituatie</span>
              </div>
            </div>
            <div class="section-body" id="exercise-context"></div>
          </div>

          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">↔</span>
                <span class="section-title">Speler Variant</span>
                <span class="variant-badge" id="exercise-handedness">Linkshandig</span>
              </div>
            </div>
            <div class="section-body">
              <div class="info-grid" id="exercise-variant"></div>
            </div>
          </div>

          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">🎯</span>
                <span class="section-title">Doel</span>
              </div>
            </div>
            <div class="section-body" id="exercise-goal"></div>
          </div>

          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">🧰</span>
                <span class="section-title">Start Setup</span>
              </div>
            </div>
            <div class="section-body" id="exercise-setup"></div>
          </div>

          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">🥅</span>
                <span class="section-title">Targets</span>
              </div>
            </div>
            <div class="section-body">
              <div class="target-list" id="exercise-targets"></div>
            </div>
          </div>

          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">🏃</span>
                <span class="section-title">Uitvoering</span>
              </div>
            </div>
            <div class="section-body">
              <div class="execution-steps" id="exercise-execution"></div>
            </div>
          </div>

          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">✅</span>
                <span class="section-title">Scoreballen</span>
              </div>
            </div>
            <div class="section-body" id="exercise-score"></div>
          </div>

          <div class="section-block">
            <div class="section-header-block">
              <div class="section-title-group">
                <span class="section-icon">📖</span>
                <span class="section-title">Volledige Uitwerking</span>
              </div>
            </div>
            <div class="section-body">
              <div class="full-content-stack" id="exercise-full"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="data/exercise-blueprints.js"></script>
    <script src="data/exercise-blueprints-extra.js"></script>
    <script src="exercise-detail.js"></script>
  </body>
</html>
